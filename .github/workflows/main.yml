name: Build and Release

on:
  push:
    tags:
      - 'v1.0.0'

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            output_name: QTyper.exe
          - os: ubuntu-latest
            output_name: QTyper
          - os: macos-latest
            output_name: QTyper
    runs-on: ${{ matrix.os }}
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: pip install pyinstaller pygame pyside6
        
      - name: Build with PyInstaller
        run: pyinstaller --noconsole --name QTyper --add-data "assets;assets" main.py
        
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.os }}
          path: dist/${{ matrix.output_name }}
