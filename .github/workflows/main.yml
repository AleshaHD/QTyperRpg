name: Build and Release

on:
  push:
    tags:
      - 'v1.0.0'

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact_name: QTyper-Windows
            separator: ';'
          - os: ubuntu-latest
            artifact_name: QTyper-Linux
            separator: ':'
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: pip install pyinstaller pyside6 pygame
        
      - name: Build with PyInstaller
        run: pyinstaller --noconsole --name QTyper main.py
        
      - name: Copy assets (Cross-platform)
        shell: python
        run: |
          import shutil, os
          os.makedirs('dist/QTyper/assets', exist_ok=True)
          shutil.copytree('assets', 'dist/QTyper/assets', dirs_exist_ok=True)
        
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/QTyper/